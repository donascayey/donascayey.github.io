        /* Perbaikan: Menghilangkan double # dan menggunakan Flexbox untuk centering */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c2c2c; /* Warna lebih gelap agar video stand out */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        /* Container Video yang lebih solid */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        /* Banner Iklan Atas (Overlay) */
        .ad-overlay-top {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            min-width: 320px;
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Iklan Bawah */
        .bottom-ad-section {
            margin-top: 25px;
            width: 100%;
            max-width: 728px;
        }

        @media (max-width: 480px) {
            .video-title { font-size: 1.2rem; }
            .ad-overlay-top { transform: translateX(-50%) scale(0.8); top: 5px; }
        }
    </style>
</head>
